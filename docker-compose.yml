version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: roan
      POSTGRES_USER: roan
      POSTGRES_PASSWORD: roan123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  app:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    environment:
      DATABASE_URL: postgresql://roan:roan123@db:5432/roan
      REDIS_URL: redis://redis:6379
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID}
      FRED_API_KEY: ${FRED_API_KEY}

volumes:
  pgdata:
